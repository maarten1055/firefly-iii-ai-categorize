<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>FireflyService III AI Categorizer</title>
    <style>
        body {
            font-family: sans-serif;
            background: lightgray;
        }

        .container {
            max-width: max(80%, 1024px);
            margin: 5% auto;
            padding: 24px;
            background: #FFF;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, .25);
        }

        h1 {
            text-align: center;
        }

        .toolbar,
        .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .button {
            border: 0;
            border-radius: 5px;
            padding: 10px 14px;
            cursor: pointer;
            background: #1f2937;
            color: #fff;
        }

        .diagnostics {
            border: solid 1px #d1d5db;
            border-radius: 5px;
            padding: 16px;
            margin-bottom: 24px;
            background: #f9fafb;
        }

        .checks {
            display: grid;
            gap: 12px;
        }

        .check {
            border-radius: 5px;
            padding: 12px;
            background: #fff;
            border: solid 1px #e5e7eb;
        }

        .check.ok {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .check.error {
            border-color: #fca5a5;
            background: #fef2f2;
        }

        .muted {
            color: #6b7280;
        }

        .status-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            background: #e5e7eb;
            color: #1f2937;
        }

        .status-pill.queued {
            background: #e0f2fe;
            color: #075985;
        }

        .status-pill.in_progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-pill.finished {
            background: #dcfce7;
            color: #166534;
        }

        .status-pill.failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .job {
            border: solid 1px #d1d5db;
            border-radius: 5px;
            margin-bottom: 2em;
            padding: 24px;
            background: #fff;
        }

        .job.queued {
            border-color: #7dd3fc;
        }

        .job.in_progress {
            border-color: #fbbf24;
            background: #fffbeb;
        }

        .job.finished {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .job.failed {
            border-color: #fca5a5;
            background: #fef2f2;
        }

        .error-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 5px;
            border: solid 1px #fca5a5;
            background: #fff1f2;
            color: #7f1d1d;
        }

        pre {
            padding: 7px;
            background: #eeeeee;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Firefly III AI Categorizer</h1>
        <section class="diagnostics">
            <div class="toolbar">
                <div>
                    <h2>System Check</h2>
                    <div id="diagnostics-summary" class="muted">Run a live check against Firefly III and Mistral.</div>
                </div>
                <button id="run-diagnostics" class="button" type="button">Run checks</button>
            </div>
            <div id="diagnostics-checks" class="checks"></div>
        </section>
        <section>
            <div class="section-heading">
                <h2>Jobs</h2>
                <div id="job-status-summary" class="status-summary">
                    <span class="status-pill">No jobs yet</span>
                </div>
            </div>
            <div id="mount"></div>
            <!--        <article class="job">-->
            <!--            <div><strong>Status:</strong> <span>queued</span></div>-->
            <!--            <div><strong>Created:</strong>-->
            <!--                <time>2023-05-21 15:50:00</time>-->
            <!--            </div>-->
            <!--            <div><strong>Webhook UUID:</strong> <span>34zrurjd-44df-we4dtfds</span></div>-->
            <!--            <div><strong>Destination name:</strong> <span>LIEFERANDO.DE LIEFERSERVI</span></div>-->
            <!--            <div><strong>Description:</strong> <span>LIEFERANDO.DE LIEFERSERVI; AMSTERDAM NL; KARTE 8338; 40010075001 16052023; KDN-REF 000000986464</span>-->
            <!--            </div>-->
            <!--            <div><strong>Prompt:</strong><br>-->
            <!--                <pre>Given i want to categorize transactions on my bank account into this categories: Bargeld, Gas, Haushalt, Kino, Lebensmittel, Lieferdienst, ÖPNV, Restaurants, Rundfunkbeitrag, Strom-->
            <!--In which category would a transaction from "LIEFERANDO.DE LIEFERSERVI" with the subject "LIEFERANDO.DE LIEFERSERVI; AMSTERDAM NL; KARTE 8338; 40010075001 16052023; KDN-REF 000000986464" fall into?-->
            <!--Just output the name of the category. Does not have to be a complete sentence.</pre>-->
            <!--            </div>-->
            <!--            <div><strong>Open AI's guess:</strong><br>-->
            <!--                <pre>-->
            <!--Lieferdienst-->
            <!--</pre>-->
            <!--            </div>-->
            <!--        </article>-->
        </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = io();

        const mount = document.getElementById('mount');
        const diagnosticsSummary = document.getElementById('diagnostics-summary');
        const diagnosticsChecks = document.getElementById('diagnostics-checks');
        const diagnosticsButton = document.getElementById('run-diagnostics');
        const jobStatusSummary = document.getElementById('job-status-summary');
        const jobsById = new Map();

        diagnosticsButton.addEventListener('click', async () => {
            diagnosticsButton.disabled = true;
            diagnosticsButton.textContent = 'Checking...';
            diagnosticsSummary.textContent = 'Running live checks...';

            try {
                const response = await fetch('/api/diagnostics');
                const diagnostics = await response.json();

                diagnosticsSummary.textContent = diagnostics.ok
                    ? 'All configured integrations responded successfully.'
                    : 'One or more checks failed.';

                diagnosticsChecks.innerHTML = diagnostics.checks.map(renderCheck).join('');
            } catch (error) {
                diagnosticsSummary.textContent = `Diagnostics failed to load: ${error.message}`;
                diagnosticsChecks.innerHTML = '';
            } finally {
                diagnosticsButton.disabled = false;
                diagnosticsButton.textContent = 'Run checks';
            }
        });

        socket.on('jobs', jobs => {
            console.log('jobs', jobs);
            jobsById.clear();
            jobs.forEach(job => jobsById.set(job.id, job));
            renderJobs();
        });

        socket.on('job created', e => {
            console.log('job created', e);
            jobsById.set(e.job.id, e.job);
            renderJobs();
        });

        socket.on('job updated', e => {
            console.log('job updated', e);
            jobsById.set(e.job.id, e.job);
            renderJobs();
        });

        const renderJobs = () => {
            const jobs = Array.from(jobsById.values())
                .sort((a, b) => new Date(b.created) - new Date(a.created));

            mount.innerHTML = jobs.map(renderJob).join('');
            renderJobStatusSummary(jobs);
        };

        const renderJobStatusSummary = (jobs) => {
            if (jobs.length === 0) {
                jobStatusSummary.innerHTML = '<span class="status-pill">No jobs yet</span>';
                return;
            }

            const counts = {
                queued: 0,
                in_progress: 0,
                finished: 0,
                failed: 0,
            };

            jobs.forEach(job => {
                counts[job.status] = (counts[job.status] ?? 0) + 1;
            });

            jobStatusSummary.innerHTML = ['queued', 'in_progress', 'finished', 'failed']
                .map(status => `<span class="status-pill ${status}">${formatStatus(status)}: ${counts[status] ?? 0}</span>`)
                .join('');
        };

        const formatStatus = (status) => {
            switch (status) {
                case 'in_progress':
                    return 'In progress';
                case 'finished':
                    return 'Finished';
                case 'failed':
                    return 'Failed';
                case 'queued':
                default:
                    return 'Queued';
            }
        };

        const escapeHtml = (value) => String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const renderJob = (job) => {
            return `<article class="job ${escapeHtml(job.status)}" data-job-id="${escapeHtml(job.id)}">
            <div><strong>ID:</strong> <span>${escapeHtml(job.id)}</span></div>
            <div><strong>Status:</strong> <span class="status-pill ${escapeHtml(job.status)}">${escapeHtml(formatStatus(job.status))}</span></div>
            <div><strong>Created:</strong>
                <time>${Intl.DateTimeFormat(undefined, {
                dateStyle: 'medium',
                timeStyle: 'medium'
            }).format(new Date(job.created))}</time>
            </div>
            <div><strong>Destination name:</strong> <span>${escapeHtml(job.data?.destinationName || '')}</span></div>
            <div><strong>Description:</strong> <span>${escapeHtml(job.data?.description || '')}</span></div>
            <div><strong>Guessed category:</strong> <span>${job.data?.category ? escapeHtml(job.data.category) : '<em>Not yet classified</em>'}</span></div>
            <div><strong>Guessed budget:</strong> <span>${job.data?.budget ? escapeHtml(job.data.budget) : '<em>Not yet classified</em>'}</span></div>
            ${job.data?.error ? `<div class="error-box"><strong>Error:</strong> <span>${escapeHtml(job.data.error)}</span></div>` : ''}
            ${job.data?.prompt ? `<div><strong>Prompt:</strong><br>
                <details>
                    <summary>Show</summary>
                    <pre>${escapeHtml(job.data.prompt)}</pre>
                </details>
            </div>` : ''}
            ${job.data?.response ? `<div><strong>Model response:</strong>
                 <details>
                    <summary>Show</summary>
                    <pre>${escapeHtml(job.data.response)}</pre>
                 </details>
            </div>` : ''}
        </article>`;
        };

        const renderCheck = (check) => {
            const details = check.ok
                ? Object.entries(check.details)
                    .map(([key, value]) => `<div><strong>${escapeHtml(key)}:</strong> <span>${escapeHtml(value)}</span></div>`)
                    .join('')
                : `<div><strong>Error:</strong> <span>${escapeHtml(check.error)}</span></div>`;

            return `<article class="check ${check.ok ? 'ok' : 'error'}">
                <div><strong>${escapeHtml(check.name)}</strong> <span>${check.ok ? 'OK' : 'Failed'}</span></div>
                ${details}
            </article>`;
        };
    </script>
</body>

</html>
