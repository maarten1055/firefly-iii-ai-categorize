<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Firefly III AI Categorizer</title>
    <style>
        body {
            font-family: sans-serif;
            background: lightgray;
        }

        .container {
            max-width: max(80%, 1024px);
            margin: 5% auto;
            padding: 24px;
            background: #FFF;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, .25);
        }

        h1 {
            text-align: center;
        }

        .toolbar,
        .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .button {
            border: 0;
            border-radius: 5px;
            padding: 10px 14px;
            cursor: pointer;
            background: #1f2937;
            color: #fff;
            text-decoration: none;
        }

        .button.secondary {
            background: #2563eb;
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .diagnostics {
            border: solid 1px #d1d5db;
            border-radius: 5px;
            padding: 16px;
            margin-bottom: 24px;
            background: #f9fafb;
        }

        .checks {
            display: grid;
            gap: 12px;
        }

        .check {
            border-radius: 5px;
            padding: 12px;
            background: #fff;
            border: solid 1px #e5e7eb;
        }

        .check.ok {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .check.error {
            border-color: #fca5a5;
            background: #fef2f2;
        }

        .muted {
            color: #6b7280;
        }

        .status-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            background: #e5e7eb;
            color: #1f2937;
        }

        .status-pill.queued {
            background: #e0f2fe;
            color: #075985;
        }

        .status-pill.in_progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-pill.finished {
            background: #dcfce7;
            color: #166534;
        }

        .status-pill.partial {
            background: #ede9fe;
            color: #6d28d9;
        }

        .status-pill.failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-pill.live {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-pill.offline {
            background: #f3f4f6;
            color: #4b5563;
        }

        .job {
            border: solid 1px #d1d5db;
            border-radius: 5px;
            margin-bottom: 2em;
            padding: 24px;
            background: #fff;
        }

        .job.queued {
            border-color: #7dd3fc;
        }

        .job.in_progress {
            border-color: #fbbf24;
            background: #fffbeb;
        }

        .job.finished {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .job.partial {
            border-color: #c4b5fd;
            background: #f5f3ff;
        }

        .job.failed {
            border-color: #fca5a5;
            background: #fef2f2;
        }

        .error-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 5px;
            border: solid 1px #fca5a5;
            background: #fff1f2;
            color: #7f1d1d;
        }

        .job-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 12px;
        }

        pre {
            padding: 7px;
            background: #eeeeee;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Firefly III AI Categorizer</h1>
        <section class="diagnostics">
            <div class="toolbar">
                <div>
                    <h2>System Check</h2>
                    <div id="diagnostics-summary" class="muted">Run a live check against Firefly III and the configured AI provider.</div>
                </div>
                <button id="run-diagnostics" class="button" type="button">Run checks</button>
            </div>
            <div id="diagnostics-checks" class="checks"></div>
        </section>
        <section>
            <div class="section-heading">
                <div>
                    <h2>Jobs</h2>
                    <a class="button secondary" href="/uncategorized.html">Open uncategorized transactions</a>
                </div>
                <div id="job-status-summary" class="status-summary">
                    <span class="status-pill">No jobs yet</span>
                </div>
                <div id="live-status" class="status-pill offline">Realtime offline</div>
            </div>
            <div id="mount"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
    <script src="/index.js"></script>
</body>

</html>
